<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>얼굴 분석 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 0 20px; }
    h2 { border-bottom: 2px solid #ddd; padding-bottom: 8px; }
    button { padding: 10px 22px; font-size: 15px; margin: 6px; cursor: pointer; border: none; border-radius: 6px; }
    .green { background: #4CAF50; color: white; }
    .red   { background: #f44336; color: white; }
    .blue  { background: #2196F3; color: white; }
    #container { display: flex; gap: 20px; align-items: flex-start; }
    #videoWrap { position: relative; }
    video { border-radius: 8px; display: block; }
    canvas { position: absolute; top: 0; left: 0; border-radius: 8px; }
    #stats { flex: 1; background: #f5f5f5; padding: 16px; border-radius: 8px; min-width: 220px; }
    .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
    .stat-val { font-weight: bold; color: #333; }
    #report { background: #e8f5e9; padding: 16px; border-radius: 8px; margin-top: 16px; display: none; }
    .feedback { color: #555; font-size: 14px; margin: 4px 0; }
    #tensionBar { height: 12px; border-radius: 6px; background: #ddd; margin-top: 4px; }
    #tensionFill { height: 100%; border-radius: 6px; background: #4CAF50; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h2>얼굴 분석 테스트</h2>
  <div>
    <button id="startBtn" class="green">분석 시작</button>
    <button id="stopBtn" class="red" disabled>분석 중지 & 리포트</button>
  </div>
  <div id="container" style="margin-top:16px;">
    <div id="videoWrap">
      <video id="video" width="480" height="360" autoplay muted></video>
      <canvas id="canvas" width="480" height="360"></canvas>
    </div>
    <div id="stats">
      <h3 style="margin-top:0;">실시간 분석</h3>
      <div class="stat-row"><span>시선 방향</span><span class="stat-val" id="statGaze">-</span></div>
      <div class="stat-row"><span>눈 깜빡임</span><span class="stat-val" id="statBlink">0회</span></div>
      <div class="stat-row"><span>표정 변화</span><span class="stat-val" id="statExpr">-</span></div>
      <div class="stat-row"><span>긴장도</span></div>
      <div id="tensionBar"><div id="tensionFill"></div></div>
      <div style="font-size:12px; color:#888; margin-top:4px;" id="tensionLabel">0%</div>
    </div>
  </div>

  <div id="report">
    <h3 style="margin-top:0;">분석 리포트</h3>
    <div id="reportContent"></div>
  </div>

  <!-- MediaPipe -->
  <script type="module">
    import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';

    const SESSION_ID = 'test-' + Date.now();
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');

    let faceLandmarker, running = false, animId;
    let blinkCount = 0, prevEAR = 1, blinking = false;

    // 눈 랜드마크 인덱스 (MediaPipe 468점)
    const LEFT_EYE  = [33, 160, 158, 133, 153, 144];
    const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
    const LEFT_IRIS  = [468, 469, 470, 471, 472];
    const RIGHT_IRIS = [473, 474, 475, 476, 477];

    function eyeAspectRatio(landmarks, indices) {
      const p = i => landmarks[i];
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      const vertical = (dist(p(indices[1]), p(indices[5])) + dist(p(indices[2]), p(indices[4]))) / 2;
      const horizontal = dist(p(indices[0]), p(indices[3]));
      return vertical / horizontal;
    }

    function gazeDirection(landmarks) {
      if (!landmarks[LEFT_IRIS[0]] || !landmarks[RIGHT_IRIS[0]]) return 'center';

      const leftIrisX  = landmarks[LEFT_IRIS[0]].x;
      const leftEyeL   = landmarks[LEFT_EYE[0]].x;
      const leftEyeR   = landmarks[LEFT_EYE[3]].x;
      const ratio = (leftIrisX - leftEyeL) / (leftEyeR - leftEyeL);

      if (ratio < 0.35) return 'left';
      if (ratio > 0.65) return 'right';
      return 'center';
    }

    function tensionScore(ear, gazeDir) {
      let score = 0;
      if (ear < 0.2) score += 0.4;          // 눈 많이 감음
      if (gazeDir !== 'center') score += 0.3; // 시선 이탈
      if (blinkCount > 2) score += 0.3;       // 깜빡임 많음
      return Math.min(score, 1);
    }

    function expressionScore(blendShapes) {
      if (!blendShapes?.length) return 0;
      const targets = ['mouthSmileLeft', 'mouthSmileRight', 'browDownLeft', 'browDownRight', 'jawOpen'];
      let total = 0;
      blendShapes[0].categories.forEach(c => {
        if (targets.includes(c.categoryName)) total += c.score;
      });
      return Math.min(total / targets.length, 1);
    }

    async function init() {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
      );
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU',
        },
        outputFaceBlendshapes: true,
        runningMode: 'VIDEO',
        numFaces: 1,
      });
    }

    async function detect() {
      if (!running) return;
      const result = faceLandmarker.detectForVideo(video, performance.now());

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (result.faceLandmarks?.length > 0) {
        const lm = result.faceLandmarks[0];

        // EAR 계산
        const ear = (eyeAspectRatio(lm, LEFT_EYE) + eyeAspectRatio(lm, RIGHT_EYE)) / 2;

        // 눈 깜빡임 감지
        if (ear < 0.18 && !blinking) { blinking = true; blinkCount++; }
        if (ear > 0.22) blinking = false;
        prevEAR = ear;

        // 시선
        const gaze = gazeDirection(lm);

        // 긴장도
        const tension = tensionScore(ear, gaze);

        // 표정
        const expr = expressionScore(result.faceBlendshapes);

        // UI 업데이트
        const gazeKo = { center: '정면', left: '왼쪽', right: '오른쪽', up: '위', down: '아래' };
        document.getElementById('statGaze').textContent = gazeKo[gaze] || gaze;
        document.getElementById('statBlink').textContent = blinkCount + '회';
        document.getElementById('statExpr').textContent = (expr * 100).toFixed(0) + '%';
        document.getElementById('tensionFill').style.width = (tension * 100) + '%';
        document.getElementById('tensionFill').style.background = tension > 0.6 ? '#f44336' : tension > 0.3 ? '#ff9800' : '#4CAF50';
        document.getElementById('tensionLabel').textContent = (tension * 100).toFixed(0) + '%';

        // 얼굴 윤곽 그리기
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 1;
        [33, 133, 362, 263, 1, 61, 291, 199].forEach(i => {
          const p = lm[i];
          ctx.beginPath();
          ctx.arc(p.x * canvas.width, p.y * canvas.height, 3, 0, 2 * Math.PI);
          ctx.fillStyle = '#00ff00';
          ctx.fill();
        });

        // 서버로 데이터 전송 (2초마다)
        if (Date.now() % 2000 < 100) {
          fetch('http://localhost:4000/api/face/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: SESSION_ID, gazeDirection: gaze, blinkCount, expressionScore: expr, tensionScore: tension, timestamp: Date.now() }),
          }).catch(() => {});
        }
      }

      animId = requestAnimationFrame(detect);
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = '초기화 중...';

      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await new Promise(r => video.onloadeddata = r);

      await init();

      running = true;
      blinkCount = 0;
      detect();

      startBtn.textContent = '분석 중';
      stopBtn.disabled = false;
      document.getElementById('report').style.display = 'none';
    });

    stopBtn.addEventListener('click', async () => {
      running = false;
      cancelAnimationFrame(animId);
      video.srcObject?.getTracks().forEach(t => t.stop());
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      startBtn.disabled = false;
      startBtn.textContent = '분석 시작';
      stopBtn.disabled = true;

      // 리포트 요청
      const res = await fetch(`http://localhost:4000/api/face/report/${SESSION_ID}`);
      const data = await res.json();

      const reportDiv = document.getElementById('report');
      const content   = document.getElementById('reportContent');
      reportDiv.style.display = 'block';

      content.innerHTML = `
        <div class="stat-row"><span>분석 시간</span><span class="stat-val">${data.durationSec}초</span></div>
        <div class="stat-row"><span>정면 응시</span><span class="stat-val">${data.gazeRatio.center}%</span></div>
        <div class="stat-row"><span>평균 긴장도</span><span class="stat-val">${(data.avgTension * 100).toFixed(0)}%</span></div>
        <div class="stat-row"><span>분당 눈 깜빡임</span><span class="stat-val">${data.blinkPerMin}회</span></div>
        <hr>
        <strong>피드백</strong>
        ${data.feedback.map(f => `<div class="feedback">• ${f}</div>`).join('')}
      `;
    });
  </script>
</body>
</html>
