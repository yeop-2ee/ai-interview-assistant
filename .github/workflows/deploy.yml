name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app
            git fetch origin main
            git reset --hard origin/main

            # 프론트엔드 의존성 및 빌드
            cd /home/ec2-user/app/frontend
            npm install
            npm run build

            # 백엔드 의존성 및 DB 마이그레이션
            cd /home/ec2-user/app/backend
            npm install
            npx prisma generate
            npx prisma migrate deploy

            # AI 파이프라인 의존성
            cd /home/ec2-user/app/ai-pipeline
            npm install

            # 미디어 서비스 의존성
            cd /home/ec2-user/app/media-service
            npm install

            # PM2 재시작
            pm2 restart all
            pm2 save
